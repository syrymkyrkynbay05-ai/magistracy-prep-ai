[build]
builder = "NIXPACKS"

[build.phases.setup]
nixPkgs = ["python311"]

[build.phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[deploy]
startCommand = "cd backend && python3 seed_db.py && python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/health"
interval = 30
timeout = 5
healthThreshold = 1
unhealthyThreshold = 2
