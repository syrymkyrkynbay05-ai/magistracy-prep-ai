[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && python seed_db.py && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/health"
interval = 30
timeout = 5
healthThreshold = 1
unhealthyThreshold = 2
