[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_18"]

[phases.install]
cmds = [
    "npm install",
    "python -m venv /app/venv",
    "/app/venv/bin/pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
    "npm run build",
    "/app/venv/bin/python backend/seed_db.py"
]

[start]
cmd = "/app/venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
