[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs-18_x", "npm"]

[phases.install]
cmds = [
    "cd backend && pip install -r requirements.txt",
    "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && python seed_db.py && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
